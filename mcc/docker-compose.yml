# MCC Docker Compose - Phase 1A.1 (仅 Redis)
# 后续 Phase 1A.2 加入 PostgreSQL, Ollama 按需添加

services:
  redis:
    image: redis:7-alpine
    container_name: mcc-redis
    ports:
      - "${MCC_REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
